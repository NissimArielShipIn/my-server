<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>צור קשר</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #222;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.6rem;
    }

    .card-header h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
    }

    .card-header p {
      color: #888;
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    /* ─── Fields ─── */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    label .required {
      color: #e94560;
      margin-right: 2px;
    }

    input,
    textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #e94560;
      background: #fff;
    }

    input.invalid,
    textarea.invalid {
      border-color: #e94560;
      background: #fff8f9;
    }

    input.valid,
    textarea.valid {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .field-error {
      font-size: 0.8rem;
      color: #e94560;
      margin-top: 0.35rem;
      min-height: 1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .char-count {
      text-align: left;
      font-size: 0.78rem;
      color: #bbb;
      margin-top: 0.3rem;
    }

    .char-count.warn {
      color: #f59e0b;
    }

    /* ─── Submit ─── */
    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover:not(:disabled) {
      background: #c73652;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ─── Success ─── */
    .success-screen {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }

    .success-screen .success-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      80%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .success-screen h2 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .success-screen p {
      color: #888;
      margin-bottom: 1.5rem;
    }

    .btn-reset {
      background: #f0f2f5;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover {
      background: #e2e6ea;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="card-header">
      <div class="icon">✉️</div>
      <h1>צור קשר</h1>
      <p>נשמח לשמוע ממך — נחזור אליך בהקדם</p>
    </div>

    <form id="contact-form" novalidate>

      <div class="field">
        <label for="name">שם מלא <span class="required">*</span></label>
        <input type="text" id="name" placeholder="ישראל ישראלי" autocomplete="name" />
        <div class="field-error" id="name-error"></div>
      </div>

      <div class="field">
        <label for="email">כתובת אימייל <span class="required">*</span></label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
        <div class="field-error" id="email-error"></div>
      </div>

      <div class="field">
        <label for="message">הודעה <span class="required">*</span></label>
        <textarea id="message" rows="5" placeholder="כתוב את הודעתך כאן..." maxlength="500"></textarea>
        <div class="char-count" id="char-count">0 / 500</div>
        <div class="field-error" id="message-error"></div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span>שלח הודעה</span> <span>→</span>
      </button>

    </form>

    <div class="success-screen" id="success-screen">
      <div class="success-icon">✅</div>
      <h2>ההודעה נשלחה!</h2>
      <p>תודה שפנית אלינו. נחזור אליך בהקדם.</p>
      <button class="btn-reset" onclick="resetForm()">שלח הודעה נוספת</button>
    </div>

  </div>

  <script>
    const fields = {
      name:    { el: document.getElementById('name'),    err: document.getElementById('name-error') },
      email:   { el: document.getElementById('email'),   err: document.getElementById('email-error') },
      message: { el: document.getElementById('message'), err: document.getElementById('message-error') },
    };

    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function validate(id) {
      const { el, err } = fields[id];
      const val = el.value.trim();
      let msg = '';

      if (id === 'name') {
        if (!val)        msg = 'שם הוא שדה חובה.';
        else if (val.length < 2) msg = 'שם חייב להכיל לפחות 2 תווים.';
      }

      if (id === 'email') {
        if (!val)              msg = 'אימייל הוא שדה חובה.';
        else if (!EMAIL_RE.test(val)) msg = 'כתובת אימייל לא תקינה.';
      }

      if (id === 'message') {
        if (!val)        msg = 'הודעה היא שדה חובה.';
        else if (val.length < 10) msg = 'ההודעה חייבת להכיל לפחות 10 תווים.';
      }

      err.textContent = msg ? '⚠ ' + msg : '';
      el.classList.toggle('invalid', !!msg);
      el.classList.toggle('valid',   !msg && val.length > 0);
      return !msg;
    }

    Object.keys(fields).forEach(id => {
      fields[id].el.addEventListener('blur',  () => validate(id));
      fields[id].el.addEventListener('input', () => {
        if (fields[id].el.classList.contains('invalid')) validate(id);
      });
    });

    fields.message.el.addEventListener('input', () => {
      const len = fields.message.el.value.length;
      const counter = document.getElementById('char-count');
      counter.textContent = `${len} / 500`;
      counter.classList.toggle('warn', len > 400);
    });

    document.getElementById('contact-form').addEventListener('submit', e => {
      e.preventDefault();
      const valid = Object.keys(fields).map(id => validate(id)).every(Boolean);
      if (!valid) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span>שולח...</span>';

      setTimeout(() => {
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
      }, 800);
    });

    function resetForm() {
      Object.values(fields).forEach(({ el, err }) => {
        el.value = '';
        el.classList.remove('valid', 'invalid');
        err.textContent = '';
      });
      document.getElementById('char-count').textContent = '0 / 500';
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').innerHTML = '<span>שלח הודעה</span> <span>→</span>';
      document.getElementById('contact-form').style.display = 'block';
      document.getElementById('success-screen').style.display = 'none';
    }
  </script>

</body>
</html>
